<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" width="1120" height="720" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',Arial,sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="fig1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cfe0ff"/><stop offset="1" stop-color="#7fb0ff"/>
    </linearGradient>
    <linearGradient id="fig2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7d6ff"/><stop offset="1" stop-color="#f7b8d6"/>
    </linearGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2f8"/><stop offset="1" stop-color="#d6e0ef"/>
    </linearGradient>
  </defs>

  <rect width="1120" height="720" fill="#e9ebef"/>
  <!-- window -->
  <rect x="8" y="8" width="1104" height="704" rx="12" fill="#ffffff" stroke="#dde1e6" filter="url(#shadow)"/>

  <!-- top bar -->
  <g>
    <circle cx="36" cy="34" r="9" fill="none" stroke="#2d6cdf" stroke-width="3"/>
    <line x1="43" y1="41" x2="51" y2="49" stroke="#2d6cdf" stroke-width="3.5" stroke-linecap="round"/>
    <text x="60" y="40" font-size="18" font-weight="700" fill="#1c1e21">JournalLens</text>
    <!-- controls -->
    <rect x="812" y="20" width="94" height="28" rx="6" fill="#fff" stroke="#dde1e6"/>
    <text x="825" y="39" font-size="13" fill="#1c1e21">English ▾</text>
    <rect x="914" y="20" width="82" height="28" rx="6" fill="#fff" stroke="#dde1e6"/>
    <text x="930" y="39" font-size="13" fill="#1c1e21">Refresh</text>
    <rect x="1004" y="20" width="92" height="28" rx="6" fill="#fff" stroke="#e25563"/>
    <text x="1016" y="39" font-size="13" fill="#e25563">♥ Donate</text>
  </g>
  <line x1="8" y1="60" x2="1112" y2="60" stroke="#dde1e6"/>

  <!-- sidebar -->
  <rect x="8" y="60" width="232" height="652" fill="#ffffff"/>
  <line x1="240" y1="60" x2="240" y2="712" stroke="#dde1e6"/>
  <text x="24" y="88" font-size="11" letter-spacing="0.6" fill="#5c6470">FOLLOWED JOURNALS</text>
  <text x="24" y="116" font-size="13" fill="#1c1e21">All journals</text>
  <text x="24" y="148" font-size="13" fill="#1c1e21">Nature</text>
  <rect x="14" y="166" width="220" height="28" rx="6" fill="#e6eefc"/>
  <text x="24" y="185" font-size="13" font-weight="700" fill="#2d6cdf">Nature Methods</text>
  <text x="24" y="216" font-size="13" fill="#1c1e21">eLife</text>
  <text x="24" y="256" font-size="11" letter-spacing="0.6" fill="#5c6470">FOLLOW A JOURNAL</text>
  <rect x="16" y="268" width="216" height="30" rx="6" fill="#f5f6f8" stroke="#dde1e6"/>
  <text x="26" y="288" font-size="12" fill="#9aa1ab">Journal name or ISSN…</text>

  <!-- main -->
  <rect x="240" y="60" width="872" height="652" fill="#f5f6f8"/>

  <!-- card 1 (English content) -->
  <g>
    <rect x="258" y="78" width="836" height="300" rx="10" fill="#ffffff" stroke="#dde1e6"/>
    <rect x="274" y="94" width="200" height="150" rx="8" fill="url(#fig1)"/>
    <polyline points="290,210 320,180 350,196 380,150 410,170 440,130" fill="none" stroke="#2d6cdf" stroke-width="3" opacity="0.8"/>
    <g fill="#1c3e82" opacity="0.7"><circle cx="320" cy="180" r="4"/><circle cx="380" cy="150" r="4"/><circle cx="440" cy="130" r="4"/></g>
    <text x="492" y="114" font-size="15.5" font-weight="700" fill="#1c1e21">Capturing single nucleosome architectures at scale</text>
    <text x="492" y="136" font-size="12" fill="#5c6470">Fariha Rahman, Jordan Reibel, Anja Mezger … et al.</text>
    <text x="492" y="158" font-size="12"><tspan fill="#2d6cdf" font-weight="700">Nature Methods</tspan><tspan fill="#5c6470"> · 2026-06-11 · Vol. 23</tspan></text>
    <rect x="703" y="148" width="30" height="15" rx="7" fill="#2e9e5b"/>
    <text x="709" y="159.5" font-size="10" font-weight="700" fill="#ffffff">OA</text>
    <text x="492" y="182" font-size="12" fill="#1c1e21">We introduce a scalable single-molecule method that resolves individual</text>
    <text x="492" y="199" font-size="12" fill="#1c1e21">nucleosome architectures genome-wide, revealing how local chromatin</text>
    <text x="492" y="216" font-size="12" fill="#1c1e21">packaging shapes accessibility and transcription across cell states.</text>
    <!-- figure strip -->
    <g>
      <rect x="492" y="232" width="80" height="54" rx="5" fill="url(#strip)" stroke="#dde1e6"/>
      <rect x="580" y="232" width="80" height="54" rx="5" fill="url(#strip)" stroke="#dde1e6"/>
      <rect x="668" y="232" width="80" height="54" rx="5" fill="url(#strip)" stroke="#dde1e6"/>
      <rect x="756" y="232" width="80" height="54" rx="5" fill="url(#strip)" stroke="#dde1e6"/>
      <rect x="844" y="232" width="80" height="54" rx="5" fill="url(#strip)" stroke="#dde1e6"/>
      <text x="492" y="299" font-size="10" fill="#5c6470">Fig 1   Fig 2   Fig 3   Fig 4   Fig 5  · click to enlarge with caption</text>
    </g>
    <!-- buttons -->
    <rect x="492" y="328" width="120" height="30" rx="6" fill="#2d6cdf"/>
    <text x="506" y="348" font-size="12" fill="#ffffff">Add to Zotero</text>
    <rect x="624" y="328" width="86" height="30" rx="6" fill="#fff" stroke="#dde1e6"/>
    <text x="636" y="348" font-size="12" fill="#1c1e21">Open page</text>
    <rect x="722" y="328" width="64" height="30" rx="6" fill="#fff" stroke="#dde1e6"/>
    <text x="734" y="348" font-size="12" fill="#1c1e21">EN / 中</text>
  </g>

  <!-- card 2 (translated to Chinese — demonstrates EN⇄中文) -->
  <g>
    <rect x="258" y="394" width="836" height="300" rx="10" fill="#ffffff" stroke="#dde1e6"/>
    <rect x="274" y="410" width="200" height="150" rx="8" fill="url(#fig2)"/>
    <g stroke="#8e44ad" stroke-width="3" opacity="0.75" fill="none">
      <path d="M294,520 q20,-50 40,0 t40,0 t40,0"/>
    </g>
    <rect x="300" y="430" width="14" height="40" rx="2" fill="#8e44ad" opacity="0.5"/>
    <rect x="320" y="445" width="14" height="25" rx="2" fill="#8e44ad" opacity="0.5"/>
    <rect x="340" y="420" width="14" height="50" rx="2" fill="#8e44ad" opacity="0.5"/>
    <text x="492" y="430" font-size="15.5" font-weight="700" fill="#1c1e21">实验性创伤性脑损伤后海马 θ–γ 振荡耦合的破坏</text>
    <text x="492" y="452" font-size="12" fill="#5c6470">Christopher D Adam, Ehsan Mirzakhalili … et al.</text>
    <text x="492" y="474" font-size="12"><tspan fill="#2d6cdf" font-weight="700">eLife</tspan><tspan fill="#5c6470"> · 2026-06-12 · Vol. 13</tspan></text>
    <rect x="567" y="464" width="30" height="15" rx="7" fill="#2e9e5b"/>
    <text x="573" y="475.5" font-size="10" font-weight="700" fill="#ffffff">OA</text>
    <text x="492" y="498" font-size="12" fill="#1c1e21">创伤性脑损伤常导致持续的学习与记忆障碍,这可能源于支持记忆编码</text>
    <text x="492" y="515" font-size="12" fill="#1c1e21">与提取的海马环路振荡耦合受到破坏。我们通过在体电生理记录精确</text>
    <text x="492" y="532" font-size="12" fill="#1c1e21">控制海马神经元活动,揭示了 theta–gamma 耦合的时序变化规律。</text>
    <g>
      <rect x="492" y="548" width="80" height="54" rx="5" fill="url(#strip)" stroke="#dde1e6"/>
      <rect x="580" y="548" width="80" height="54" rx="5" fill="url(#strip)" stroke="#dde1e6"/>
      <rect x="668" y="548" width="80" height="54" rx="5" fill="url(#strip)" stroke="#dde1e6"/>
      <rect x="756" y="548" width="80" height="54" rx="5" fill="url(#strip)" stroke="#dde1e6"/>
      <rect x="844" y="548" width="80" height="54" rx="5" fill="url(#strip)" stroke="#dde1e6"/>
      <text x="492" y="615" font-size="10" fill="#5c6470">图 1   图 2   图 3   图 4   图 5  · 点击放大查看图注</text>
    </g>
    <rect x="492" y="644" width="120" height="30" rx="6" fill="#2d6cdf"/>
    <text x="506" y="664" font-size="12" fill="#ffffff">Add to Zotero</text>
    <rect x="624" y="644" width="86" height="30" rx="6" fill="#fff" stroke="#dde1e6"/>
    <text x="636" y="664" font-size="12" fill="#1c1e21">Open page</text>
    <rect x="722" y="644" width="70" height="30" rx="6" fill="#fff" stroke="#2d6cdf"/>
    <text x="734" y="664" font-size="12" fill="#2d6cdf">Original</text>
  </g>
</svg>
