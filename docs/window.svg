    <text x="739" y="162" font-size="10" font-weight="700" fill="#ffffff">OA</text>
    <text x="504" y="188" font-size="12" fill="#1c1e21">A microfluidic imaging workflow resolves dynamic metabolite gradients</text>
    <text x="504" y="206" font-size="12" fill="#1c1e21">with subcellular spatial precision and links chemical variation to cell state.</text>
