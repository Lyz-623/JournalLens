    <text x="504" y="422" font-size="15" font-weight="700" fill="#1c1e21">用于高通量单细胞读出的可重构传感平台</text>
    <text x="504" y="446" font-size="12" fill="#5c6470">Y. Wang, D. Lee, I. Morgan et al.</text>
    <text x="504" y="468" font-size="12"><tspan fill="#1556b8" font-weight="700">Nature Methods</tspan><tspan fill="#5c6470"> · 2026-06-10</tspan></text>
    <text x="504" y="494" font-size="12" fill="#1c1e21">该方法将可重构探针、自动化显微成像与统计建模结合,</text>
    <text x="504" y="512" font-size="12" fill="#1c1e21">在复杂样本中快速识别细胞状态差异并保留空间上下文。</text>
