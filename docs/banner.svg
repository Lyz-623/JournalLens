<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d6cdf"/>
      <stop offset="1" stop-color="#16306a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>
  <!-- decorative concentric lens rings -->
  <g stroke="#ffffff" fill="none" opacity="0.10">
    <circle cx="1010" cy="150" r="60"/>
    <circle cx="1010" cy="150" r="100"/>
    <circle cx="1010" cy="150" r="150"/>
  </g>
  <!-- lens + J mark -->
  <g transform="translate(96,150)">
    <circle cx="0" cy="0" r="44" fill="none" stroke="#ffffff" stroke-width="9"/>
    <line x1="32" y1="32" x2="74" y2="74" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
    <path d="M12 -20 v32 c0 12 -7 19 -19 19 c-6 0 -11 -2 -15 -5" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.92"/>
  </g>
  <text x="210" y="138" fill="#ffffff" font-size="68" font-weight="700">JournalLens</text>
  <text x="214" y="186" fill="#ffffff" font-size="25" opacity="0.96">Follow your favourite journals inside Zotero</text>
  <text x="214" y="224" fill="#dce7ff" font-size="18" opacity="0.92">past month · abstracts · figures &amp; captions · EN ⇄ 中文 · one-click import</text>
  <g transform="translate(214,250)" font-size="13" fill="#ffffff">
    <rect x="0" y="0" width="118" height="26" rx="13" fill="#ffffff" opacity="0.16"/>
    <text x="14" y="17">Zotero 7 · 8 · 9</text>
    <rect x="130" y="0" width="92" height="26" rx="13" fill="#ffffff" opacity="0.16"/>
    <text x="144" y="17">MIT License</text>
    <rect x="232" y="0" width="120" height="26" rx="13" fill="#ffffff" opacity="0.16"/>
    <text x="246" y="17">Free &amp; open source</text>
  </g>
</svg>
