<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
	<title>JournalLens Settings</title>
	<style>
		:root {
			color-scheme: light dark;
			--panel: Canvas;
			--text: CanvasText;
			--muted: GrayText;
			--border: #d9dee7;
			--accent: #1f6feb;
		}
		@media (prefers-color-scheme: dark) {
			:root {
				--border: #3c3e44;
				--accent: #6c9ef8;
			}
		}
		body {
			margin: 0;
			padding: 18px;
			color: var(--text);
			background: var(--panel);
			font: 13px "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
		}
		#journallens-prefs {
			max-width: 680px;
		}
		h2 {
			margin: 0 0 6px;
			font-size: 18px;
			font-weight: 650;
		}
		.description {
			margin: 0 0 16px;
			color: var(--muted);
			line-height: 1.45;
		}
		.row {
			display: grid;
			grid-template-columns: minmax(190px, 250px) minmax(160px, 1fr);
			align-items: center;
			gap: 12px;
			padding: 10px 0;
			border-top: 1px solid var(--border);
		}
		label {
			font-weight: 600;
		}
		input, select {
			min-height: 30px;
			max-width: 240px;
			box-sizing: border-box;
			padding: 4px 8px;
			font: inherit;
		}
		input[type="checkbox"] {
			min-height: auto;
			margin-right: 8px;
		}
		.check {
			display: flex;
			align-items: center;
			font-weight: 500;
		}
		.actions {
			display: flex;
			gap: 8px;
			padding-top: 14px;
			border-top: 1px solid var(--border);
		}
		button {
			min-height: 30px;
			padding: 4px 12px;
			border: 1px solid var(--border);
			border-radius: 6px;
			background: var(--panel);
			color: var(--text);
			font: inherit;
		}
		button.primary {
			border-color: var(--accent);
			color: var(--accent);
		}
	</style>
</head>
<body>
	<section id="journallens-prefs">
		<h2>JournalLens</h2>
		<p id="pref-description" class="description">
			Follow journals, browse recent papers, translate abstracts and load article figures.
		</p>

		<div class="row">
			<label id="label-language" for="pref-language">Interface language</label>
			<select id="pref-language">
				<option value="auto">Follow Zotero</option>
				<option value="zh">中文</option>
				<option value="en">English</option>
			</select>
		</div>

		<div class="row">
			<label id="label-days" for="pref-days">Days to fetch</label>
			<input id="pref-days" type="number" min="1" max="180"/>
		</div>

		<div class="row">
			<label id="label-articles" for="pref-articles">Max articles per journal</label>
			<input id="pref-articles" type="number" min="10" max="500"/>
		</div>

		<div class="row">
			<label id="label-translate" for="pref-translate">Translation service</label>
			<select id="pref-translate">
				<option value="google">Google</option>
				<option value="mymemory">MyMemory</option>
			</select>
		</div>

		<div class="row">
			<span id="label-filter">Content filter</span>
			<label class="check">
				<input id="pref-filter" type="checkbox"/>
				<span id="text-filter">Only show research content</span>
			</label>
		</div>

		<div class="row">
			<span id="label-figures">Figures</span>
			<label class="check">
				<input id="pref-figures" type="checkbox"/>
				<span id="text-figures">Load body and extended figures</span>
			</label>
		</div>

		<div class="actions">
			<button id="pref-homepage" class="primary" type="button">GitHub</button>
			<button id="pref-donate" type="button">Donate</button>
		</div>
	</section>
</body>
</html>
