<vbox id="journallens-prefs">
	<linkset>
		<html:link rel="localization" href="journallens.ftl"/>
	</linkset>
	<groupbox>
		<label><html:h2 data-l10n-id="journallens-prefs-title">JournalLens</html:h2></label>

		<hbox align="center">
			<label data-l10n-id="journallens-prefs-language" value="Interface language:"/>
			<menulist preference="extensions.journallens.uiLanguage" native="true"
				style="margin-inline-start: 6px;">
				<menupopup>
					<menuitem data-l10n-id="journallens-prefs-lang-auto" label="Follow Zotero" value="auto"/>
					<menuitem label="English" value="en"/>
					<menuitem label="中文" value="zh"/>
				</menupopup>
			</menulist>
		</hbox>

		<hbox align="center" style="margin-top: 6px;">
			<label data-l10n-id="journallens-prefs-days" value="Days to fetch:"/>
			<html:input type="number" min="7" max="180" style="width: 70px; margin-inline-start: 6px;"
				preference="extensions.journallens.daysToFetch"/>
		</hbox>

		<hbox align="center" style="margin-top: 6px;">
			<label data-l10n-id="journallens-prefs-articles" value="Max articles fetched per journal:"/>
			<html:input type="number" min="10" max="500" style="width: 70px; margin-inline-start: 6px;"
				preference="extensions.journallens.articlesPerJournal"/>
		</hbox>

		<hbox align="center" style="margin-top: 6px;">
			<label data-l10n-id="journallens-prefs-cache" value="Cache duration (minutes):"/>
			<html:input type="number" min="5" max="1440" style="width: 70px; margin-inline-start: 6px;"
				preference="extensions.journallens.cacheMinutes"/>
		</hbox>

		<hbox align="center" style="margin-top: 6px;">
			<label data-l10n-id="journallens-prefs-translate" value="Translation service:"/>
			<menulist preference="extensions.journallens.translateProvider" native="true"
				style="margin-inline-start: 6px;">
				<menupopup>
					<menuitem label="Google" value="google"/>
					<menuitem label="MyMemory" value="mymemory"/>
				</menupopup>
			</menulist>
		</hbox>

		<checkbox data-l10n-id="journallens-prefs-filter" native="true" style="margin-top: 8px;"
			label="Only show research content (hide news, editorials, perspectives…)"
			preference="extensions.journallens.filterArticleTypes"/>
		<checkbox data-l10n-id="journallens-prefs-figures" native="true" style="margin-top: 4px;"
			label="Load article figures and captions (open-access articles)"
			preference="extensions.journallens.loadFigures"/>

		<separator/>
		<hbox>
			<button data-l10n-id="journallens-prefs-homepage" label="GitHub"
				oncommand="Zotero.launchURL('https://github.com/Lyz-623/JournalLens')"/>
			<button data-l10n-id="journallens-prefs-donate" label="♥ Donate"
				oncommand="Zotero.launchURL('https://github.com/Lyz-623/JournalLens/blob/main/DONATE.md')"/>
		</hbox>
	</groupbox>
</vbox>
