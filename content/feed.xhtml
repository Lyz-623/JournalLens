<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
	<title>JournalLens</title>
	<meta charset="utf-8"/>
	<link rel="stylesheet" href="feed.css"/>
	<script src="feed.js" defer="defer"></script>
</head>
<body>
	<header id="topbar">
		<div id="brand">
			<svg id="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
				<circle cx="14" cy="14" r="9" fill="none" stroke="currentColor" stroke-width="3"/>
				<path d="M21 21 L28 28" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
				<path d="M16.5 9.5 v7.2 c0 2.4 -1.4 3.8 -3.7 3.8 c-1.2 0 -2.1 -0.3 -2.8 -0.9"
					fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
			</svg>
			<span id="brand-name">JournalLens</span>
		</div>
		<div id="topbar-actions">
			<span id="lang-label">Language</span>
			<div id="lang-toggle" class="segmented" role="group" aria-label="Language">
				<button type="button" data-lang="auto" id="lang-option-auto">Auto</button>
				<button type="button" data-lang="zh" id="lang-option-zh">中文</button>
				<button type="button" data-lang="en" id="lang-option-en">EN</button>
			</div>
			<button id="refresh-btn">Refresh</button>
			<button id="donate-btn" class="donate">♥ Donate</button>
		</div>
	</header>

	<div id="layout">
		<aside id="sidebar">
			<div id="add-journal">
				<h2 id="h-add">Follow a journal</h2>
				<input id="journal-search-input" type="text" placeholder="Journal name or ISSN…"/>
				<ul id="journal-search-results" hidden="hidden"></ul>
			</div>

			<h2 id="h-followed">Followed journals</h2>
			<ul id="journal-list"></ul>
		</aside>

		<main id="content">
			<div id="feed-tools">
				<input id="article-search-input" type="search" placeholder="Search title or abstract…"/>
				<span id="article-search-count"></span>
			</div>
			<div id="status" hidden="hidden"></div>
			<div id="cards"></div>
		</main>
	</div>

	<!-- Figure lightbox -->
	<div id="lightbox" hidden="hidden">
		<div id="lightbox-inner">
			<div id="lightbox-toolbar">
				<button id="lightbox-prev" type="button">‹</button>
				<button id="lightbox-zoom-out" type="button">−</button>
				<button id="lightbox-zoom-reset" type="button">100%</button>
				<button id="lightbox-zoom-in" type="button">+</button>
				<button id="lightbox-next" type="button">›</button>
				<button id="lightbox-close" type="button">✕</button>
			</div>
			<div id="lightbox-stage">
				<button id="lightbox-nav-prev" class="lightbox-nav" type="button">‹</button>
				<img id="lightbox-img" src="" alt=""/>
				<button id="lightbox-nav-next" class="lightbox-nav" type="button">›</button>
			</div>
			<div id="lightbox-caption"></div>
		</div>
	</div>

	<!-- Donation modal -->
	<div id="donate-modal" hidden="hidden">
		<div id="donate-inner">
			<button id="donate-close">✕</button>
			<h2 id="donate-title">Support JournalLens ♥</h2>
			<p id="donate-intro"></p>
			<div id="donate-grid">
				<figure class="donate-item">
					<img src="donate/paypal.jpg" alt="PayPal"/>
					<figcaption id="cap-paypal">PayPal</figcaption>
				</figure>
				<figure class="donate-item">
					<img src="donate/wechat.jpg" alt="WeChat Pay"/>
					<figcaption id="cap-wechat">WeChat Pay</figcaption>
				</figure>
				<figure class="donate-item">
					<img src="donate/alipay.jpg" alt="Alipay"/>
					<figcaption id="cap-alipay">Alipay</figcaption>
				</figure>
			</div>
			<p id="donate-thanks">Thank you! 🙏</p>
			<a id="donate-github" href="#">Open donation page on GitHub</a>
		</div>
	</div>
</body>
</html>
