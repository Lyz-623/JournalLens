<?xml version="1.0" encoding="UTF-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
	<title>JournalLens</title>
	<meta charset="utf-8"/>
	<link rel="stylesheet" href="feed.css"/>
	<script src="feed.js" defer="defer"></script>
</head>
<body>
	<header id="topbar">
		<div id="brand">
			<span id="brand-icon">🔭</span>
			<span id="brand-name">JournalLens</span>
		</div>
		<div id="topbar-actions">
			<label id="lang-label" for="lang-select">Language</label>
			<select id="lang-select">
				<option id="lang-option-auto" value="auto">Follow Zotero</option>
				<option id="lang-option-zh" value="zh">中文</option>
				<option id="lang-option-en" value="en">English</option>
			</select>
			<button id="refresh-btn">Refresh</button>
			<button id="donate-btn" class="donate">♥ Donate</button>
		</div>
	</header>

	<div id="layout">
		<aside id="sidebar">
			<h2 id="h-followed">Followed journals</h2>
			<ul id="journal-list"></ul>

			<div id="add-journal">
				<h2 id="h-add">Follow a journal</h2>
				<input id="journal-search-input" type="text" placeholder="Journal name or ISSN…"/>
				<ul id="journal-search-results" hidden="hidden"></ul>
			</div>
		</aside>

		<main id="content">
			<div id="status" hidden="hidden"></div>
			<div id="cards"></div>
		</main>
	</div>

	<!-- Figure lightbox -->
	<div id="lightbox" hidden="hidden">
		<div id="lightbox-inner">
			<button id="lightbox-close">✕</button>
			<img id="lightbox-img" src="" alt=""/>
			<div id="lightbox-caption"></div>
		</div>
	</div>

	<!-- Donation modal -->
	<div id="donate-modal" hidden="hidden">
		<div id="donate-inner">
			<button id="donate-close">✕</button>
			<h2 id="donate-title">Support JournalLens ♥</h2>
			<p id="donate-intro"></p>
			<div id="donate-grid">
				<figure class="donate-item">
					<img src="donate/paypal.jpg" alt="PayPal"/>
					<figcaption id="cap-paypal">PayPal</figcaption>
				</figure>
				<figure class="donate-item">
					<img src="donate/wechat.jpg" alt="WeChat Pay"/>
					<figcaption id="cap-wechat">WeChat Pay</figcaption>
				</figure>
				<figure class="donate-item">
					<img src="donate/alipay.jpg" alt="Alipay"/>
					<figcaption id="cap-alipay">Alipay</figcaption>
				</figure>
			</div>
			<p id="donate-thanks">Thank you! 🙏</p>
			<a id="donate-github" href="#">Open donation page on GitHub</a>
		</div>
	</div>
</body>
</html>
